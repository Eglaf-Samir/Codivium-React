# ─── Codivium Platform — nginx performance config snippet ───────────────────
# Add to your nginx server {} block (or include this file)
# Assumes you are serving the /path/to/codivium_platform directory as root

# ── Gzip compression ─────────────────────────────────────────────────────────
gzip                on;
gzip_vary           on;
gzip_proxied        any;
gzip_comp_level     6;
gzip_min_length     256;
gzip_types
    text/css
    text/html
    application/javascript
    application/json
    image/svg+xml
    font/woff2
    font/woff;

# ── Brotli compression (requires ngx_brotli module) ──────────────────────────
# brotli            on;
# brotli_comp_level 6;
# brotli_types      text/css text/html application/javascript application/json;

# ── Static asset caching (hashed filenames can use longer TTL) ───────────────
# For content-addressed assets (add hash to filename in build pipeline):
# location ~* "\.[0-9a-f]{8}\.(js|css)$" {
#   expires 1y;
#   add_header Cache-Control "public, immutable";
# }

# Versioned assets (query string e.g. ?v=2)
location ~* \.(js|css|png|svg|ico|woff2|woff)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    add_header Vary "Accept-Encoding";
}

# Dashboard API: short cache for dynamic payload
location /api/dashboard/payload {
    proxy_pass http://localhost:5000;
    add_header Cache-Control "private, max-age=60, stale-while-revalidate=120";
    add_header Vary "Accept-Encoding";
}

# ── Security headers ──────────────────────────────────────────────────────────
# Add to your nginx server {} block alongside the performance config above.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; connect-src 'self'; upgrade-insecure-requests;" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
